# AladdinAI — production compose using prebuilt images from GHCR.
#
# Pull updates: docker compose pull
# Pin a version: set ALADDINAI_VERSION in your .env (defaults to "latest").

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Self-hosted metasearch engine that powers the `web_search` agent tool.
  # No paid search API, no external gateway — the backend queries it directly
  # at http://searxng:8080. The settings are inlined below via `configs` so a
  # single docker-compose.yml is fully self-contained (no extra files to ship).
  searxng:
    image: searxng/searxng:2026.7.19-6da6eee26
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-please-change-this-searxng-secret}
    configs:
      - source: searxng_settings
        target: /etc/searxng/settings.yml
    healthcheck:
      # Must return 200 on the JSON endpoint — proves formats:[html,json] is on.
      # (SearXNG disables JSON by default and 403s until it's enabled.)
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://localhost:8080/search?q=ping&format=json' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/aliyevaladddin/aladdinai-backend:${ALADDINAI_VERSION:-latest}
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override to point at the docker-compose Postgres service, not localhost.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # web_search tool queries this in-stack SearXNG (GET /search?format=json).
      ALADDINAI_SEARCH_URL: ${ALADDINAI_SEARCH_URL:-http://searxng:8080}
    volumes:
      - media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/aliyevaladddin/aladdinai-frontend:${ALADDINAI_VERSION:-latest}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Server-side Next.js rewrites need to reach backend via the compose network
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  media:

configs:
  # Inlined SearXNG config. The one line that matters is `formats: [html, json]`
  # — SearXNG ships with the JSON API disabled and returns HTTP 403 until it is
  # enabled here, which is exactly what makes web search silently fail.
  searxng_settings:
    content: |
      use_default_settings: true
      server:
        secret_key: "${SEARXNG_SECRET:-please-change-this-searxng-secret}"
        limiter: false
        image_proxy: false
      search:
        formats:
          - html
          - json
