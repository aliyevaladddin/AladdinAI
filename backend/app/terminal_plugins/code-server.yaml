# Builtin "terminal" provider — code-server
#
# Strictly speaking this isn't a terminal but a full VS Code workspace in the
# browser; we treat it as another plugin-slot occupant because the user-facing
# contract is identical (iframe with a token-gated URL). VS Code's integrated
# terminal gives the same affordance as ttyd plus a full editor.
#
# We use the linuxserver/code-server image because it's the smallest "real
# VS Code OSS" build (~250MB on Alpine), keeps under the 1GB bar the user
# explicitly asked for, and has a stable env contract.
#
# Auth: linuxserver/code-server defaults to its own password gate; we disable
# it (`PASSWORD=""` + `SUDO_PASSWORD=""`) because our Traefik forward-auth +
# single-use token already gate the iframe. Anyone inside the iframe has
# already proved they're the owning user.

type: code-server
name: VS Code (code-server)
description: |
  Full VS Code in the browser — integrated terminal, file editor,
  extensions. Lightweight Alpine build (~250 MB).

image: lscr.io/linuxserver/code-server:latest

internal_port: 8443

# code-server reads PORT/HOST from env; the entrypoint script also wants PUID,
# PGID, and TZ. We let the image use its defaults except for disabling auth.
env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Etc/UTC"
  PASSWORD: ""
  SUDO_PASSWORD: ""
  PROXY_DOMAIN: ""
  DEFAULT_WORKSPACE: "/config/workspace"

# The image already runs the right command — keeping `command` empty lets the
# entrypoint script set everything up (chown, code-server invocation).
command: []

healthcheck:
  # code-server serves /healthz when alive.
  test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8443/healthz"]
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

requires_ssh_proxy: false

url_template: "{scheme}://{host}/p/{provider_id}/?token={token}"
