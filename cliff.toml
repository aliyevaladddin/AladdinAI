[changelog]
header = "# Changelog\n\nAll notable changes to AladdinAI will be documented in this file. This changelog follows the conventional commits specification.\n\n"
body = """
{% if version %}\
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/aliyevaladddin/AladdinAI/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}
"""
trim = true
footer = """
<!-- Generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs?(\\(|!|:)", group = "Documentation" },
  { message = "^build", group = "Build" },
  { message = "^ci", group = "CI" },
  { message = "^style", group = "Style" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^chore", group = "Maintenance" },
  { message = "^debug", skip = true },
]
tag_pattern = "v[0-9].*"

