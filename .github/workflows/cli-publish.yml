name: Publish CLI

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Derive the published version from the tag name rather than verifying
      # it against the committed package.json. The release flow bumps
      # cli/package.json in a commit that lands on main *after* the tag is
      # cut, so the tagged tree can still carry the old version — setting it
      # in-place keeps the npm publish in lockstep with the tag (and the
      # Docker images, which use the same v* tag) regardless.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: ./cli
        run: npm version "${GITHUB_REF#refs/tags/v}" --no-git-tag-version --allow-same-version

      - name: Install CLI dependencies
        working-directory: ./cli
        run: npm install --no-audit --no-fund

      - name: Smoke test (--help)
        working-directory: ./cli
        run: node index.js --help

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        working-directory: ./cli
        run: npm publish --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}

      - name: Publish
        if: ${{ !inputs.dry_run }}
        working-directory: ./cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}
