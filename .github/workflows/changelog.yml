name: Changelog

on:
  push:
    branches: [main]

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -fsSL https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz \
          | tar -xz --strip-components=1
          sudo mv git-cliff /usr/local/bin/

      - name: Generate changelog
        run: git-cliff --output CHANGELOG.md

      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.ALADDINAI_BOT_APP_ID }}
          private_key: ${{ secrets.ALADDINAI_BOT_PRIVATE_KEY }}

      - name: Commit and create PR
        run: |
          git config user.name "AladdinAI[bot]"
          git config user.email "AladdinAI[bot]@users.noreply.github.com"

          # Check if there are changes
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changelog changes"
            exit 0
          fi

          # Create branch and commit
          BRANCH_NAME="bot/changelog-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git commit -m "chore: update changelog [skip ci]"
          git push https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ github.repository }}.git HEAD:"$BRANCH_NAME"

          # Create PR and auto-merge
          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ steps.generate_token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "{\"title\":\"chore: update changelog\",\"head\":\"$BRANCH_NAME\",\"base\":\"main\",\"body\":\"Automated changelog update from AladdinAI bot\"}")

          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number')
          if [ "$PR_NUMBER" != "null" ]; then
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ steps.generate_token.outputs.token }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/merge \
              -d '{"merge_method":"squash"}'
          fi
