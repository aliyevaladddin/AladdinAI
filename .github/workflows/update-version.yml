name: Update Version

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package.json versions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd frontend && npm version $VERSION --no-git-tag-version
          cd ../cli && npm version $VERSION --no-git-tag-version

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json cli/package.json
          git diff --staged --quiet || (git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} [skip ci]" && git push origin main)
