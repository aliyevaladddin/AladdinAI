name: RCF Protocol Audit

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  rcf-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install RCF Protocol
        run: npm install -g rcf-protocol@2.0.3

      - name: Run RCF Compliance Audit
        env:
          RCF_LICENSE_KEY: ${{ secrets.RCF_LICENSE_KEY }}
        run: |
          # Perform security audit using Restricted Correlation Framework (NPM version)
          rcf-protocol audit . --license-key "$RCF_LICENSE_KEY"
