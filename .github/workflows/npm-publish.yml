name: Publish CLI to NPM

on:
  push:
    branches: [ main ]
    paths:
      - 'cli/**'
      - '.github/workflows/npm-publish.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        working-directory: ./cli
        run: npm install

      - name: Publish to NPM
        working-directory: ./cli
        run: |
          npm config set //registry.npmjs.org/:_authToken ${{ secrets.NPM_API_TOKEN }}
          npm publish --access public
