# Build and publish backend + frontend Docker images to GHCR.
#
# Trigger: pushing a tag like v1.0.0 builds both images and tags them:
#   - ghcr.io/<owner>/aladdinai-backend:1.0.0
#   - ghcr.io/<owner>/aladdinai-backend:latest
#   - same for aladdinai-frontend
#
# Manual `workflow_dispatch` is available for ad-hoc rebuilds without a tag.
#
# Auth: uses the workflow's built-in GITHUB_TOKEN (no PATs needed) — GHCR
# accepts it as long as the repo is the same org/user as the package namespace.

name: docker-publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: 'manual')"
        required: false
        default: "manual"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile.prod
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          OWNER_LC=$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${REGISTRY}/${OWNER_LC}/aladdinai-${{ matrix.name }}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            VERSION="${{ inputs.tag }}"
            echo "tags=${IMAGE}:${VERSION}" >> "$GITHUB_OUTPUT"
          fi
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
          platforms: linux/amd64,linux/arm64

      - name: Summary
        run: |
          echo "### Published ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags: \`${{ steps.tags.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
