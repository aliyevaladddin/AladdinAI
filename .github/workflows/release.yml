name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from release tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package.json versions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd frontend && npm version $VERSION --no-git-tag-version
          cd ../cli && npm version $VERSION --no-git-tag-version

      - name: Commit version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json cli/package.json
          git diff --staged --quiet || (git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} [skip ci]" && git push origin main)

      - name: Install CLI dependencies
        working-directory: ./cli
        run: npm install --no-audit --no-fund

      - name: Smoke test CLI
        working-directory: ./cli
        run: node index.js --help

      - name: Publish CLI to npm
        working-directory: ./cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}
