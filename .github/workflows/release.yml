name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from release tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package.json versions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd frontend && npm version $VERSION --no-git-tag-version
          cd ../cli && npm version $VERSION --no-git-tag-version

      - name: Install frontend dependencies
        working-directory: ./frontend
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        run: npm install --no-fund

      - name: Auto-fix security vulnerabilities
        working-directory: ./frontend
        run: |
          # Run audit fix to update resolvable vulnerabilities in overrides / lock file
          npm audit fix --force || true
          # Ensure package-lock.json reflects overrides
          npm install --no-fund

      - name: Commit version and security changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json frontend/package-lock.json cli/package.json
          git diff --staged --quiet || (git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} and update deps [skip ci]" && git push origin HEAD:main)

      # CLI is published by cli-publish.yml on the same v* tag — this workflow
      # only keeps main's package.json versions in sync. Do not add an npm
      # publish step here or releases will publish to npm twice.
