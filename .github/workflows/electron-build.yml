name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*' # Запуск при пуше тега, например v1.0.0
  workflow_dispatch: # Ручной запуск

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build and Package
        working-directory: ./frontend
        run: npm run electron:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Если у тебя есть сертификаты для подписи macOS/Windows, их тоже можно добавить сюда

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aladdin-ai-${{ matrix.os }}
          path: frontend/dist/*.{dmg,exe,AppImage,zip}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist/*.dmg
            frontend/dist/*.exe
            frontend/dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
