<svg xmlns="http://www.w3.org/2000/svg" width="800" height="460" role="img" viewBox="0 0 800 460"><title>AladdinAI terminal demo</title><desc>Animated terminal showing npx aladdin-ai deployment</desc><defs><style>@keyframes blink{0%,49%{opacity:1}50%{opacity:0}}.term-bg{fill:#0d1117}.term-border{fill:none;stroke:#30363d;stroke-width:1.5}.dot-r{fill:#ff5f57}.dot-y{fill:#febc2e}.dot-g{fill:#28c840}.bar{fill:#161b22}.cmd,.dim,.prompt{font-family:&apos;Courier New&apos;,monospace;font-size:13px}.prompt{fill:#4ecdc4}.cmd{fill:#e6edf3}.dim{fill:#7d8590}.ok{fill:#3fb950}.ok,.teal{font-family:&apos;Courier New&apos;,monospace;font-size:13px}.cursor,.teal{fill:#4ecdc4}.line1{animation:fadeIn .1s .5s both}.line2{animation:fadeIn .1s 1.2s both}.line3{animation:fadeIn .1s 1.5s both}.line4{animation:fadeIn .1s 1.8s both}.line5{animation:fadeIn .1s 2.4s both}.line6{animation:fadeIn .1s 2.7s both}.line7{animation:fadeIn .1s 3s both}.line8{animation:fadeIn .1s 3.6s both}.line9{animation:fadeIn .1s 3.9s both}.line10{animation:fadeIn .1s 4.2s both}.line11{animation:fadeIn .1s 5s both}.line12{animation:fadeIn .1s 5.3s both}.line13{animation:fadeIn .1s 5.6s both}.cursor-blink{animation:blink 1s 5.8s infinite}</style></defs><rect width="800" height="460" class="term-bg" rx="12"/><rect width="800" height="460" class="term-border" rx="12"/><rect width="800" height="42" class="bar" rx="12"/><rect width="800" height="12" y="30" class="bar"/><circle cx="20" cy="21" r="6" class="dot-r"/><circle cx="40" cy="21" r="6" class="dot-y"/><circle cx="60" cy="21" r="6" class="dot-g"/><text x="400" y="27" fill="#7d8590" font-family="'Courier New', monospace" font-size="12" text-anchor="middle">aladdinai — bash — 100x30</text><g class="line1"><text x="20" y="76" class="prompt">~/projects $</text><text x="115" y="76" class="cmd">npx aladdin-ai</text></g><g class="line2"><text x="20" y="98" class="dim">Need to install the following packages:</text></g><g class="line3"><text x="20" y="116" class="dim">aladdin-ai@1.0.0</text></g><g class="line4"><text x="20" y="134" class="dim">Ok to proceed? (y)</text></g><g class="line5"><text x="20" y="162" class="teal">Pulling images from ghcr.io...</text></g><g class="line6"><text x="20" y="180" class="dim">ghcr.io/aliyevaladddin/aladdinai-backend:latest</text></g><g class="line7"><text x="20" y="198" class="dim">ghcr.io/aliyevaladddin/aladdinai-frontend:latest</text></g><g class="line8"><text x="20" y="226" class="teal">Starting services...</text></g><g class="line9"><text x="20" y="244" class="ok">✓ backend started (0.8s)</text></g><g class="line10"><text x="20" y="262" class="ok">✓ frontend started (1.1s)</text></g><g class="line11"><rect width="580" height="90" x="20" y="278" fill="#0f2318" stroke="#3fb950" stroke-width="1" rx="8"/><text x="36" y="302" class="ok">✓ AladdinAI is running</text><text x="36" y="322" class="dim">Frontend:</text><text x="128" y="322" class="teal">http://localhost:3000</text><text x="36" y="342" class="dim">Backend:</text><text x="128" y="342" class="teal">http://localhost:8000</text><text x="36" y="358" class="dim">Docs:</text><text x="128" y="358" class="teal">http://localhost:8000/docs</text></g><g class="line12"><text x="20" y="388" class="dim">Press Ctrl+C to stop. Run</text><text x="213" y="388" class="cmd">npx aladdin-ai logs -f</text><text x="384" y="388" class="dim">to tail logs.</text></g><g class="line13"><text x="20" y="414" class="prompt">~/projects $</text><rect width="9" height="16" x="115" y="402" class="cursor cursor-blink"/></g><text x="400" y="445" fill="#4ecdc4" font-family="'Courier New', monospace" font-size="11" opacity=".6" text-anchor="middle">your data · your models · your rules</text></svg>