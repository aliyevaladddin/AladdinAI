<svg width="800" height="460" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AladdinAI terminal demo</title>
<desc>Animated terminal showing npx aladdin-ai deployment</desc>
<defs>
  <style>
    .term-bg { fill: #0d1117; }
    .term-border { fill: none; stroke: #30363d; stroke-width: 1.5; }
    .dot-r { fill: #ff5f57; }
    .dot-y { fill: #febc2e; }
    .dot-g { fill: #28c840; }
    .bar { fill: #161b22; }
    .prompt { fill: #4ecdc4; font-family: 'Courier New', monospace; font-size: 13px; }
    .cmd { fill: #e6edf3; font-family: 'Courier New', monospace; font-size: 13px; }
    .dim { fill: #7d8590; font-family: 'Courier New', monospace; font-size: 13px; }
    .ok { fill: #3fb950; font-family: 'Courier New', monospace; font-size: 13px; }
    .teal { fill: #4ecdc4; font-family: 'Courier New', monospace; font-size: 13px; }
    .cursor { fill: #4ecdc4; }

    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes typing { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }

    .line1 { animation: fadeIn 0.1s 0.5s both; }
    .line2 { animation: fadeIn 0.1s 1.2s both; }
    .line3 { animation: fadeIn 0.1s 1.5s both; }
    .line4 { animation: fadeIn 0.1s 1.8s both; }
    .line5 { animation: fadeIn 0.1s 2.4s both; }
    .line6 { animation: fadeIn 0.1s 2.7s both; }
    .line7 { animation: fadeIn 0.1s 3.0s both; }
    .line8 { animation: fadeIn 0.1s 3.6s both; }
    .line9 { animation: fadeIn 0.1s 3.9s both; }
    .line10 { animation: fadeIn 0.1s 4.2s both; }
    .line11 { animation: fadeIn 0.1s 5.0s both; }
    .line12 { animation: fadeIn 0.1s 5.3s both; }
    .line13 { animation: fadeIn 0.1s 5.6s both; }
    .cursor-blink { animation: blink 1s 5.8s infinite; }
  </style>
</defs>

<!-- Terminal window -->
<rect width="800" height="460" rx="12" class="term-bg"/>
<rect width="800" height="460" rx="12" class="term-border"/>

<!-- Title bar -->
<rect width="800" height="42" rx="12" class="bar"/>
<rect y="30" width="800" height="12" class="bar"/>
<circle cx="20" cy="21" r="6" class="dot-r"/>
<circle cx="40" cy="21" r="6" class="dot-y"/>
<circle cx="60" cy="21" r="6" class="dot-g"/>
<text x="400" y="27" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#7d8590">aladdinai — bash — 100x30</text>

<!-- Line 1: prompt + command -->
<g class="line1">
  <text x="20" y="76" class="prompt">~/projects $</text>
  <text x="115" y="76" class="cmd"> npx aladdin-ai</text>
</g>

<!-- Line 2 -->
<g class="line2">
  <text x="20" y="98" class="dim">Need to install the following packages:</text>
</g>
<g class="line3">
  <text x="20" y="116" class="dim">  aladdin-ai@1.0.0</text>
</g>
<g class="line4">
  <text x="20" y="134" class="dim">Ok to proceed? (y)</text>
</g>

<!-- Pulling images -->
<g class="line5">
  <text x="20" y="162" class="teal">Pulling images from ghcr.io...</text>
</g>
<g class="line6">
  <text x="20" y="180" class="dim">  ghcr.io/aliyevaladddin/aladdinai-backend:latest</text>
</g>
<g class="line7">
  <text x="20" y="198" class="dim">  ghcr.io/aliyevaladddin/aladdinai-frontend:latest</text>
</g>

<!-- Starting -->
<g class="line8">
  <text x="20" y="226" class="teal">Starting services...</text>
</g>
<g class="line9">
  <text x="20" y="244" class="ok">✓ backend   started (0.8s)</text>
</g>
<g class="line10">
  <text x="20" y="262" class="ok">✓ frontend  started (1.1s)</text>
</g>

<!-- Success box -->
<g class="line11">
  <rect x="20" y="278" width="580" height="90" rx="8" fill="#0f2318" stroke="#3fb950" stroke-width="1"/>
  <text x="36" y="302" class="ok">✓ AladdinAI is running</text>
  <text x="36" y="322" class="dim">  Frontend:  </text>
  <text x="128" y="322" class="teal">http://localhost:3000</text>
  <text x="36" y="342" class="dim">  Backend:   </text>
  <text x="128" y="342" class="teal">http://localhost:8000</text>
  <text x="36" y="358" class="dim">  Docs:      </text>
  <text x="128" y="358" class="teal">http://localhost:8000/docs</text>
</g>

<!-- Hint line -->
<g class="line12">
  <text x="20" y="388" class="dim">Press Ctrl+C to stop. Run </text>
  <text x="213" y="388" class="cmd">npx aladdin-ai logs -f</text>
  <text x="384" y="388" class="dim"> to tail logs.</text>
</g>

<!-- Next prompt -->
<g class="line13">
  <text x="20" y="414" class="prompt">~/projects $</text>
  <rect x="115" y="402" width="9" height="16" class="cursor cursor-blink"/>
</g>

<!-- Bottom badge -->
<text x="400" y="445" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#4ecdc4" opacity="0.6">your data · your models · your rules</text>

</svg>