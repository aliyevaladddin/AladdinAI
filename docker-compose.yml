services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Dev override: Traefik in compose listens on plain HTTP at the `web`
      # entrypoint, so the URLs we hand to the iframe must match. In prod
      # these are flipped to https/websecure via .env.
      TERMINAL_PUBLIC_HOST: ${TERMINAL_PUBLIC_HOST:-localhost:8086}
      TERMINAL_PUBLIC_SCHEME: ${TERMINAL_PUBLIC_SCHEME:-http}
      TERMINAL_TRAEFIK_ENTRYPOINT: ${TERMINAL_TRAEFIK_ENTRYPOINT:-web}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # Shared with Traefik: backend writes routing configs here, Traefik reads them.
      - ./backend/traefik-dynamic:/traefik-dynamic
    networks:
      - default
      - aladdin_terminal
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  traefik:
    # File provider only — no Docker API needed, no OrbStack compatibility issues.
    image: traefik:v3.7.1
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
    ports:
      - "8086:80"
      - "8081:8080"
    volumes:
      # Read-only: backend writes here, Traefik hot-reloads routes.
      - ./backend/traefik-dynamic:/etc/traefik/dynamic:ro
    networks:
      - aladdin_terminal
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:

networks:
  default:
    name: aladdinai_default
  aladdin_terminal:
    name: aladdin_terminal
    driver: bridge
