services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # Self-hosted metasearch engine backing the `web_search` agent tool.
  # The backend reaches it at http://searxng:8080 via ALADDINAI_SEARCH_URL.
  # No paid API keys, no external gateway — web_search.py hits it directly.
  searxng:
    image: searxng/searxng:latest
    environment:
      # settings.yml sets secret_key to a placeholder; override it here.
      SEARXNG_SECRET: ${SEARXNG_SECRET:-please-change-this-searxng-secret}
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
    volumes:
      # NOT :ro — the SearXNG entrypoint chowns /etc/searxng on boot and a
      # read-only mount makes it fail with "Read-only file system".
      - ./searxng:/etc/searxng
    networks:
      - default
    healthcheck:
      # JSON endpoint must answer 200 — proves formats:[html,json] is live.
      test: [ "CMD-SHELL", "wget -q -O /dev/null 'http://localhost:8080/search?q=ping&format=json' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Point the web_search tool at the in-stack SearXNG. web_search.py reads
      # ALADDINAI_SEARCH_URL and calls {url}/search?q=...&format=json.
      ALADDINAI_SEARCH_URL: ${ALADDINAI_SEARCH_URL:-http://searxng:8080}
      # Dev override: Traefik in compose listens on plain HTTP at the `web`
      # entrypoint, so the URLs we hand to the iframe must match. In prod
      # these are flipped to https/websecure via .env.
      TERMINAL_PUBLIC_HOST: ${TERMINAL_PUBLIC_HOST:-localhost:8086}
      TERMINAL_PUBLIC_SCHEME: ${TERMINAL_PUBLIC_SCHEME:-http}
      TERMINAL_TRAEFIK_ENTRYPOINT: ${TERMINAL_TRAEFIK_ENTRYPOINT:-web}
      # Allow localhost URLs for WAHA and other local services in development
      ALLOW_LOCALHOST_URLS: ${ALLOW_LOCALHOST_URLS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # DEV ONLY: mounting the host docker socket grants this container
      # effective root on the host, so it is deliberately absent from the
      # production template (cli/templates/docker-compose.yml). It exists here
      # purely as a local fallback for terminal-provider features when no
      # remote daemon is configured. In production set DOCKER_REMOTE_URL +
      # TLS certs (see .env.example) so the backend talks to a *remote* daemon
      # over the network and never touches a local socket. To drop the socket
      # even in dev, set DOCKER_SOCK_PATH=/dev/null.
      - ${DOCKER_SOCK_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # Shared with Traefik: backend writes routing configs here, Traefik reads them.
      - ./backend/traefik-dynamic:/traefik-dynamic
    networks:
      - default
      - aladdin_terminal
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  traefik:
    # File provider only — no Docker API needed, no OrbStack compatibility issues.
    image: traefik:v3.7.1
    command:
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
      - --log.level=INFO
    ports:
      - "8086:80"
      - "8081:8080"
    volumes:
      # Read-only: backend writes here, Traefik hot-reloads routes.
      - ./backend/traefik-dynamic:/etc/traefik/dynamic:ro
    networks:
      - aladdin_terminal
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev --no-turbo

volumes:
  pgdata:

networks:
  default:
    name: aladdinai_default
  aladdin_terminal:
    name: aladdin_terminal
    driver: bridge
